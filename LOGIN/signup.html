<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobLink | Sign Up</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="signup.css" />
</head>

<body>

  <div class="auth-section">
    <div class="auth-box">
      <h2>Create Account</h2>
      <p class="subtitle">Start your journey with JobLink</p>

      <!-- ✅ IMPORTANT: added class -->
      <form id="signupForm" class="auth-form">
        <input type="text" id="signupName" placeholder="Full Name" required />
        <input type="email" id="signupEmail" placeholder="Email Address" required />
        <input type="password" id="signupPass" placeholder="Password" required />
        <input type="password" id="signupConfirm" placeholder="Confirm Password" required />

        <!-- ✅ add class -->
        <button type="submit" class="btn">Sign Up</button>
      </form>

      <p class="auth-switch">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>

</body>
</html>

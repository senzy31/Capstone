<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="top-bar">JobLink</div>

<div class="login-container" id="loginSection">
  <div class="login-card">

    <h2>Welcome Back</h2>

    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button>Login</button>
    </form>

    <p>Don't have account? <a href="signup.html">Sign Up</a></p>

  </div>
</div>

<section class="jobs-section">
  <h3>Latest Job Vacancies</h3>
  <div class="jobs-slider" id="jobsGrid">Loading jobs...</div>
</section>

<div class="bottom-bar">Build Smart. Match Faster. Get Hired</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="jobs.js"></script>

</body>
</html>

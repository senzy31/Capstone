<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobLink Dashboard</title>

    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header class="top-navbar">
    <div class="logo">
        <span class="logo-blue">JOB</span><span class="logo-black">LINK</span>
    </div>

    <div class="search-container">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search...">
        </div>
    </div>

    <div class="user-controls">
        <i class="fa-regular fa-bell icon-btn"></i>
        <i class="fa-regular fa-user icon-btn"></i>
        <span class="user-name" id="userName">Loading...</span>
    </div>
</header>

<div class="main-container">

    <aside class="sidebar">
        <ul class="nav-links">
            <li class="active"><a href="#"><i class="fa-solid fa-house"></i> Dashboard</a></li>
            <li><a href="#"><i class="fa-solid fa-file-signature"></i> My Resume</a></li>
            <li><a href="#"><i class="fa-regular fa-newspaper"></i> Job Matches</a></li>
            <li><a href="#"><i class="fa-regular fa-envelope-open"></i> Application</a></li>
            <li><a href="#"><i class="fa-regular fa-user"></i> Profile</a></li>
            <li><a href="#" id="logoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a></li>
        </ul>
    </aside>

    <main class="content">

        <section class="welcome-section">
            <h1 id="welcomeText">Welcome!</h1>
            <p>Your career journey starts here.</p>
        </section>

        <section class="stat-cards">
            <div class="card stat-card">
                <h3>Resume Score</h3>
                <div class="stat-value">
                    <span class="number">85%</span>
                </div>
            </div>

            <div class="card stat-card">
                <h3>Job Matches</h3>
                <div class="stat-value">
                    <span class="number">12</span>
                </div>
            </div>

            <div class="card stat-card">
                <h3>Applications</h3>
                <div class="stat-value">
                    <span class="number">3</span>
                </div>
            </div>
        </section>

        <section class="job-matches-section">
            <div class="job-vertical-container" id="jobContainer"></div>
        </section>

    </main>
</div>

<!-- Logout Confirmation Modal -->
<div id="logoutModal" class="popup">
    <div class="popup-content logout-modal">
        <h3>Confirm Logout</h3>
        <p>Are you sure you want to logout?</p>
        <div class="logout-actions">
            <button id="confirmLogout" class="btn btn-logout-confirm">Yes, Logout</button>
            <button id="cancelLogout" class="btn btn-logout-cancel">Cancel</button>
        </div>
    </div>
</div>

<div id="jobPopup" class="popup">
    <div class="popup-content">
        <span class="close-btn" onclick="closePopup()">&times;</span>
        <h3 id="popupTitle"></h3>
        <p id="popupCompany"></p>
        <p id="popupLocation"></p>
        <p id="popupDescription"></p>
    </div>
</div>

<!-- ✅ FIX: Supabase must be loaded FIRST -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ✅ Then your JS -->
<script src="dashboard.js"></script>

</body>
</html>
